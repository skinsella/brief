name: test-eia
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Probe EIA with stored secret (safe diagnostics only)
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: |
          KEY=$(printf '%s' "$EIA_API_KEY" | tr -d '[:space:]')
          echo "raw_length=${#EIA_API_KEY} cleaned_length=${#KEY}"
          if [[ "$KEY" =~ ^[A-Za-z0-9]+$ ]]; then echo "charset=alnum-ok"; else echo "charset=UNEXPECTED-CHARS"; fi
          code=$(curl -s -o /tmp/eia.json -w "%{http_code}" "https://api.eia.gov/v2/petroleum/pri/spt/data/?api_key=${KEY}&frequency=daily&data[0]=value&length=1")
          echo "HTTP=$code"
          head -c 300 /tmp/eia.json; echo

name: economy

on:
  schedule:
    - cron: '0 8 * * 6'   # Saturdays 08:00 UTC
  workflow_dispatch:
    inputs:
      force_refresh:
        description: Force refresh all data
        required: false
        default: 'false'

concurrency:
  group: economy
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas numpy requests yfinance python-dateutil cachetools python-dotenv beautifulsoup4 lxml openpyxl pyarrow

      - name: Refresh data store
        env:
          FREIGHTOS_API_KEY: ${{ secrets.FREIGHTOS_API_KEY }}
        run: python pipelines/economy/scripts/update_data.py

      - name: Export weekly.json
        run: python pipelines/economy/export_json.py

      - name: Rebuild morning note (Anthropic polish if key present)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipelines/brief/build_morning_note.py --polish

      - uses: ./.github/actions/commit-publish
        with:
          paths: pipelines/economy/data_store pipelines/economy/cache docs/economy/data docs/data
          message: 'data(economy): weekly indicator refresh'

  notify-on-failure:
    needs: update
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Economy data refresh failed — ${new Date().toISOString().slice(0,10)}`,
              body: `The scheduled economy pipeline failed. See run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['pipeline-failure']
            });

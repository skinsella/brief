name: test-fred
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Probe FRED with stored secret (safe diagnostics only)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          KEY=$(printf '%s' "$FRED_API_KEY" | tr -d '[:space:]')
          echo "raw_length=${#FRED_API_KEY} cleaned_length=${#KEY}"
          if [[ "$KEY" =~ ^[a-f0-9]{32}$ ]]; then echo "format=ok-32-hex"; else echo "format=UNEXPECTED"; fi
          code=$(curl -s -o /tmp/fred.json -w "%{http_code}" "https://api.stlouisfed.org/fred/series/observations?series_id=DGS10&api_key=${KEY}&file_type=json&limit=1") || echo "curl_exit=$?"
          echo "HTTP=${code:-none}"
          grep -o '"count":[0-9]*' /tmp/fred.json 2>/dev/null || grep -o '"error_message":"[^"]*"' /tmp/fred.json 2>/dev/null || true
          [ "$code" = "200" ]
